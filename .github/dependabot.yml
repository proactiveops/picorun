version: 2

updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: daily
      time: "02:00"
    groups:
      pytest:
        patterns:
          - "pytest*"
      qa:
        patterns:
          - "ruff*"
          - "ty*"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 1

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 1
